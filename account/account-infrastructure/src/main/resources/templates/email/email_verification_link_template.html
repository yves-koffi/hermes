<!DOCTYPE html>
<html lang="{{lang}}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>{{email_title}}</title>
</head>
<body style="margin:0; padding:24px; background-color:#f3f6fb; font-family:Arial, sans-serif; color:#1f2937; line-height:1.6;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="border-collapse:collapse;">
    <tr>
        <td align="center">
            <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:640px; border-collapse:collapse; background:#ffffff; border-radius:16px; overflow:hidden; box-shadow:0 10px 30px rgba(15,23,42,0.08);">
                <tr>
                    <td style="padding:32px 40px; background:linear-gradient(135deg, #0f172a, #1d4ed8); color:#ffffff;">
                        <p style="margin:0; font-size:12px; letter-spacing:1.6px; text-transform:uppercase; opacity:0.84;">{{email_badge}}</p>
                        <h1 style="margin:12px 0 0; font-size:28px; line-height:1.2;">{{email_heading}}</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding:36px 40px;">
                        <p style="margin:0 0 16px; font-size:16px;">{{email_greeting}}</p>
                        <p style="margin:0 0 24px; font-size:16px;">{{email_message}}</p>
                        <p style="margin:0 0 24px;">
                            <a href="{{validation_url}}" style="display:inline-block; padding:14px 24px; background:#2563eb; color:#ffffff; text-decoration:none; font-weight:700; border-radius:10px;">{{email_action_label}}</a>
                        </p>
                        <p style="margin:0 0 12px; font-size:14px; color:#475569;">{{email_helper}}</p>
                        <p style="margin:0; padding:14px 16px; border-radius:10px; background:#f8fbff; border:1px solid #dbe4f0; font-size:14px; color:#0f172a; word-break:break-all;"><strong>{{token}}</strong></p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:20px 40px 32px; font-size:12px; color:#94a3b8; border-top:1px solid #e2e8f0;">
                        {{email_footer}}
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
